name: Tool request
description: Request a new tool for a profile or module.
title: "tool: "
labels: ["tool-request"]
body:
  - type: input
    id: tool
    attributes:
      label: Tool name
    validations:
      required: true
  - type: dropdown
    id: profile
    attributes:
      label: Best profile
      options:
        - minimal
        - coding-agent
        - human-dev
        - agent-runner
        - factory
        - security
        - local-llm
  - type: textarea
    id: reason
    attributes:
      label: Why it belongs
    validations:
      required: true
